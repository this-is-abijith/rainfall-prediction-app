<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RainSense — Rainfall Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--rain:#2563eb;--sky:#0ea5e9;--dark:#0f172a;--panel:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
.rain-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.rain-bg::before{content:'';position:absolute;inset:-10px;background:radial-gradient(ellipse at 30% 20%,rgba(37,99,235,.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 70%,rgba(14,165,233,.12) 0%,transparent 50%),linear-gradient(180deg,#0a1628 0%,#0f172a 100%)}
.drop{position:absolute;top:-20px;width:2px;background:linear-gradient(180deg,transparent,rgba(147,197,253,.4));border-radius:2px;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh)}}
.container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2.5rem 1.5rem 4rem}
header{text-align:center;margin-bottom:3rem;animation:fadeDown .7s ease both}
.logo{font-size:2.8rem;margin-bottom:.3rem}
header h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:-.02em;background:linear-gradient(135deg,#e2e8f0 0%,#94d8f8 60%,#60a5fa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.15}
header p{color:var(--muted);font-size:.95rem;margin-top:.5rem}
.badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);color:var(--accent);padding:.3rem .9rem;border-radius:99px;font-size:.78rem;font-weight:500;margin-top:1rem;letter-spacing:.04em}
.card{background:rgba(30,41,59,.85);border:1px solid var(--border);border-radius:20px;padding:2rem;backdrop-filter:blur(12px);animation:fadeUp .6s ease both}
.card+.card{margin-top:1.5rem;animation-delay:.1s}
.inputs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.4rem}
.field label{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.55rem}
.field label span.val{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text);text-transform:none;letter-spacing:0}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border);border-radius:4px;outline:none;cursor:pointer;transition:background .2s}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 0 3px rgba(56,189,248,.2);transition:box-shadow .2s,transform .2s}
input[type=range]:hover::-webkit-slider-thumb{box-shadow:0 0 0 6px rgba(56,189,248,.25);transform:scale(1.1)}
.btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:.95rem 2rem;margin-top:1.8rem;background:linear-gradient(135deg,#2563eb,#0ea5e9);border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:opacity .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 24px rgba(37,99,235,.4)}
.btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 8px 32px rgba(37,99,235,.5)}
.btn:active{transform:translateY(0)}
.btn.loading{pointer-events:none;opacity:.7}
#result{display:none}
#result.visible{display:block}
.result-hero{display:flex;align-items:center;gap:1.4rem;padding:1.6rem 2rem;border-radius:14px;margin-bottom:1.5rem}
.result-hero.rain-yes{background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.3)}
.result-hero.rain-no{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25)}
.result-emoji{font-size:3.2rem;line-height:1}
.result-label{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400}
.result-desc{font-size:.9rem;color:var(--muted);margin-top:.2rem}
.prob-wrap{text-align:center;margin-left:auto}
.prob-arc-svg{width:140px;height:90px}
.prob-track{fill:none;stroke:var(--border);stroke-width:8;stroke-linecap:round}
.prob-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.prob-pct{font-family:'DM Serif Display',serif;font-size:1.6rem;fill:var(--text)}
.prob-lbl{font-size:.7rem;fill:var(--muted)}
.derived-row{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.5rem}
.chip{background:rgba(148,163,184,.08);border:1px solid var(--border);border-radius:10px;padding:.5rem .9rem;font-size:.8rem;color:var(--muted)}
.chip strong{color:var(--text);display:block;font-size:1rem}
.importance-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.9rem}
.bar-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.55rem}
.bar-name{font-size:.8rem;color:var(--muted);width:110px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2563eb,#38bdf8);width:0;transition:width .9s cubic-bezier(.4,0,.2,1)}
.bar-pct{font-size:.78rem;color:var(--muted);width:36px;text-align:right}
@keyframes fadeDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="rain-bg" id="rainBg"></div>
<div class="container">
  <header>
    <div class="logo">🌧️</div>
    <h1>RainSense</h1>
    <p>ML-powered rainfall prediction from weather parameters</p>
    <div class="badge">⚡ RF + GBM Ensemble &nbsp;·&nbsp; {{ accuracy }}% accuracy</div>
  </header>

  <div class="card">
    <div class="inputs-grid">
      <div class="field">
        <label>Humidity <span class="val" id="vHumidity">60%</span></label>
        <input type="range" id="humidity" min="10" max="100" value="60" oninput="document.getElementById('vHumidity').textContent=this.value+'%'"/>
      </div>
      <div class="field">
        <label>Temperature <span class="val" id="vTemp">25°C</span></label>
        <input type="range" id="temperature" min="5" max="45" value="25" oninput="document.getElementById('vTemp').textContent=this.value+'°C'"/>
      </div>
      <div class="field">
        <label>Pressure <span class="val" id="vPressure">1010 hPa</span></label>
        <input type="range" id="pressure" min="980" max="1025" value="1010" oninput="document.getElementById('vPressure').textContent=this.value+' hPa'"/>
      </div>
      <div class="field">
        <label>Wind Speed <span class="val" id="vWind">15 km/h</span></label>
        <input type="range" id="wind_speed" min="0" max="60" value="15" oninput="document.getElementById('vWind').textContent=this.value+' km/h'"/>
      </div>
      <div class="field">
        <label>Cloud Cover <span class="val" id="vCloud">50%</span></label>
        <input type="range" id="cloud_cover" min="0" max="100" value="50" oninput="document.getElementById('vCloud').textContent=this.value+'%'"/>
      </div>
    </div>
    <button class="btn" id="predictBtn" onclick="predict()">
      <span id="btnIcon">🔮</span><span id="btnText">Predict Rainfall</span>
    </button>
  </div>

  <div class="card" id="result">
    <div id="resultHero" class="result-hero">
      <div class="result-emoji" id="resultEmoji">🌧️</div>
      <div>
        <div class="result-label" id="resultLabel">Rain</div>
        <div class="result-desc" id="resultDesc">Loading…</div>
      </div>
      <div class="prob-wrap">
        <svg class="prob-arc-svg" viewBox="0 0 140 90">
          <path class="prob-track" d="M20,80 A60,60 0 0,1 120,80"/>
          <path class="prob-fill" id="probArc" d="M20,80 A60,60 0 0,1 120,80"/>
          <text class="prob-pct" id="probText" x="70" y="75" text-anchor="middle">0%</text>
          <text class="prob-lbl" x="70" y="88" text-anchor="middle">PROBABILITY</text>
        </svg>
      </div>
    </div>
    <div class="derived-row">
      <div class="chip"><strong id="dewVal">—</strong>Dew Point (°C)</div>
      <div class="chip"><strong id="thVal">—</strong>Temp×Humidity</div>
    </div>
    <div class="importance-title">Feature Importance</div>
    <div id="importanceBars"></div>
  </div>
</div>

<script>
const bg=document.getElementById('rainBg');
for(let i=0;i<55;i++){const d=document.createElement('div');d.className='drop';d.style.cssText=`left:${Math.random()*100}%;height:${Math.random()*60+20}px;animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*3}s;opacity:${Math.random()*.5+.1};`;bg.appendChild(d);}

async function predict(){
  const btn=document.getElementById('predictBtn');
  document.getElementById('btnIcon').textContent='⏳';
  document.getElementById('btnText').textContent='Predicting…';
  btn.classList.add('loading');
  const payload={
    humidity:+document.getElementById('humidity').value,
    temperature:+document.getElementById('temperature').value,
    pressure:+document.getElementById('pressure').value,
    wind_speed:+document.getElementById('wind_speed').value,
    cloud_cover:+document.getElementById('cloud_cover').value,
  };
  try{
    const res=await fetch('/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    renderResult(data);
  }catch(e){alert('Error: '+e.message);}
  finally{document.getElementById('btnIcon').textContent='🔮';document.getElementById('btnText').textContent='Predict Rainfall';btn.classList.remove('loading');}
}

function renderResult(data){
  const isRain=data.prediction==='Rain';
  const prob=data.probability;
  const card=document.getElementById('result');
  card.classList.add('visible');
  const hero=document.getElementById('resultHero');
  hero.className='result-hero '+(isRain?'rain-yes':'rain-no');
  document.getElementById('resultEmoji').textContent=isRain?'🌧️':'☀️';
  document.getElementById('resultLabel').textContent=data.prediction;
  document.getElementById('resultDesc').textContent=data.description;
  const arc=document.getElementById('probArc');
  arc.style.stroke=isRain?'#06b6d4':'#f59e0b';
  setTimeout(()=>{
    arc.style.strokeDashoffset=220-(prob/100)*220;
    animateCount('probText',0,prob,900,v=>v.toFixed(1)+'%');
  },50);
  document.getElementById('dewVal').textContent=data.dew_point;
  document.getElementById('thVal').textContent=data.temp_humidity;
  const container=document.getElementById('importanceBars');
  container.innerHTML='';
  const imp=data.importances;
  const max=Math.max(...Object.values(imp));
  Object.entries(imp).forEach(([name,val])=>{
    const pct=Math.round(val*100);
    const w=Math.round((val/max)*100);
    const row=document.createElement('div');
    row.className='bar-row';
    row.innerHTML=`<div class="bar-name">${name.replace('_',' ')}</div><div class="bar-track"><div class="bar-fill" data-w="${w}"></div></div><div class="bar-pct">${pct}%</div>`;
    container.appendChild(row);
  });
  setTimeout(()=>{container.querySelectorAll('.bar-fill').forEach(b=>{b.style.width=b.dataset.w+'%';});},100);
  card.scrollIntoView({behavior:'smooth',block:'start'});
}

function animateCount(id,from,to,dur,fmt){
  const el=document.getElementById(id);
  const start=performance.now();
  function step(now){const t=Math.min((now-start)/dur,1);const ease=1-Math.pow(1-t,3);el.textContent=fmt(from+(to-from)*ease);if(t<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}
</script>
</body>
</html>
